<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新昌兰足球队 - 龙珠赛季</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 70%);
            color: #f8fafc;
            margin: 0;
            padding: 14px;
            padding-bottom: 110px;
        }
        
        /* 头部横幅 */
        .header {
            text-align: center;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 40%, #1d4ed8 100%);
            padding: 24px 10px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px -5px rgba(234, 88, 12, 0.3), 0 0 15px rgba(29, 78, 216, 0.2);
            border: 2px solid #fbbf24;
        }
        h1 { margin: 0; font-size: 2.1rem; color: #ffffff; text-shadow: 0 3px 6px rgba(0,0,0,0.6); letter-spacing: 2px; font-weight: 800; }
        .subtitle { margin: 10px 0 0 0; font-size: 1.25rem; color: #fcd34d; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.6); letter-spacing: 1px; }
        
        /* 说明卡片 */
        .rule-card {
            background: rgba(15, 23, 42, 0.6);
            border-left: 5px solid #ea580c;
            border-radius: 4px 14px 14px 4px;
            padding: 14px;
            margin-bottom: 15px;
        }
        .rule-title { font-size: 0.95rem; font-weight: bold; color: #fbbf24; margin-bottom: 8px; }
        .rule-item { font-size: 0.8rem; line-height: 1.6; color: #cbd5e1; margin-bottom: 6px; padding-left: 14px; position: relative; }
        .rule-item::before { content: '•'; position: absolute; left: 0; color: #ea580c; }
        .rule-item em { color: #f43f5e; font-style: normal; font-weight: bold; }

        /* 通用卡片 */
        .card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-header { border-left: 4px solid #f97316; padding-left: 10px; margin-bottom: 14px; font-size: 1rem; font-weight: bold; }
        
        /* 🌐 极速云状态栏 */
        .db-status-bar {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }
        .status-left { display: flex; align-items: center; gap: 8px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #eab308; border-radius: 50%; transition: all 0.3s; }
        .status-dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-dot.offline { background: #f43f5e; box-shadow: 0 0 8px #f43f5e; }

        /* 批量操作控制台 */
        .batch-control {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(15, 23, 42, 0.4);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px dashed rgba(249, 115, 22, 0.3);
        }
        .batch-title { width: 100%; font-size: 0.75rem; color: #fbbf24; font-weight: bold; margin-bottom: 2px; }
        .btn-sm { padding: 6px 10px; font-size: 0.75rem; border-radius: 6px; flex: 1; min-width: 100px; }

        .btn-undo {
            background: linear-gradient(135deg, #eab308, #ca8a04) !important;
            color: #0f172a !important;
            font-weight: 800 !important;
        }

        /* 表格排版 */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; text-align: center; table-layout: fixed; }
        th, td { padding: 10px 4px; border-bottom: 1px solid rgba(51, 65, 85, 0.4); border-right: 1px solid rgba(51, 65, 85, 0.2); vertical-align: middle; }
        th { background-color: #0f172a; color: #94a3b8; font-weight: 600; font-size: 0.8rem; }
        th:first-child { border-radius: 8px 0 0 0; }
        th:last-child { border-radius: 0 8px 0 0; border-right: none; }
        td:last-child { border-right: none; }
        
        .sortable-th { cursor: pointer; color: #fbbf24 !important; text-decoration: underline; text-underline-offset: 4px; }
        .player-name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; display: block; }

        /* 交互样式 */
        .editable { background-color: rgba(15, 23, 42, 0.4); color: #ffffff; border: 1px solid rgba(71, 85, 105, 0.4); border-radius: 6px; min-height: 28px; padding: 2px; }
        .power-text { color: #f59e0b; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn { flex: 1; background: linear-gradient(135deg, #f97316, #ea580c); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.85rem; text-align: center; }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .btn-green { background: linear-gradient(135deg, #10b981, #047857); }
        
        /* 底部固定的双按钮 */
        .fixed-bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a;
            padding: 12px 5%; display: flex; gap: 10px; z-index: 100;
            box-shadow: 0 -8px 20px rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.1);
        }
        .btn-bottom { flex: 1; color: white; border: none; padding: 14px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 0.95rem; text-align: center; }
        .btn-bottom-cloud { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-bottom-refresh { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        
        .footer-nav { display: flex; justify-content: space-around; margin-bottom: 15px; background: rgba(15, 23, 42, 0.6); padding: 6px; border-radius: 12px; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 0.85rem; padding: 10px; cursor: pointer; border-radius: 8px; }
        .nav-item.active { color: #ffffff; background-color: #ea580c; font-weight: bold; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        select { background-color: #0f172a; color: #fff; border: 1px solid #475569; border-radius: 6px; padding: 4px; font-size: 0.75rem; width: 100%; }
        
        .balls-container { display: flex !important; flex-direction: row !important; align-items: center !important; justify-content: space-between !important; gap: 6px !important; width: 100% !important; padding: 2px 4px !important; }
        .balls-row { display: flex !important; flex-direction: row !important; flex-wrap: wrap !important; gap: 4px !important; justify-content: flex-start !important; align-items: center !important; flex: 1 !important; min-height: 28px !important; }
        .action-btns { display: flex !important; flex-direction: row !important; gap: 4px !important; flex-shrink: 0 !important; }
        .btn-mini { color: white; border: none; padding: 4px 6px; border-radius: 5px; font-size: 0.65rem; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-consume { background: #10b981; }
        .btn-minus { background: #ef4444; }
        
        .mini-ball { display: inline-flex !important; justify-content: center !important; align-items: center !important; width: 20px !important; height: 20px !important; background: radial-gradient(circle at 35% 35%, #ffea79 0%, #ff9000 50%, #d84315 100%) !important; border-radius: 50% !important; border: 1px solid #fff3c4 !important; box-shadow: 0 1px 2px rgba(0,0,0,0.4) !important; position: relative !important; flex-shrink: 0 !important; }
        .star-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .mini-star { color: #e11d48; font-size: 6px; font-weight: 900; position: absolute; }
        
        .stars-1 .s1 { font-size: 8px; }
        .stars-2 .s1 { transform: translate(-3px, 0); } .stars-2 .s2 { transform: translate(3px, 0); }
        .stars-3 .s1 { transform: translate(0, -3px); } .stars-3 .s2 { transform: translate(-3px, 2px); } .stars-3 .s3 { transform: translate(3px, 2px); }
        .stars-4 .s1 { transform: translate(-2.5px, -2.5px); } .stars-4 .s2 { transform: translate(2.5px, -2.5px); } .stars-4 .s3 { transform: translate(-2.5px, 2.5px); } .stars-4 .s4 { transform: translate(2.5px, 2.5px); }
        .stars-5 .s1 { transform: translate(-2.5px, -2.5px); } .stars-5 .s2 { transform: translate(2.5px, -2.5px); } .stars-5 .s3 { transform: translate(0, 0); font-size: 5px; } .stars-5 .s4 { transform: translate(-2.5px, 2.5px); } .stars-5 .s5 { transform: translate(2.5px, 2.5px); }
        .stars-6 .s1 { transform: translate(0, -4px); } .stars-6 .s2 { transform: translate(-3px, -2px); } .stars-6 .s3 { transform: translate(3px, -2px); } .stars-6 .s4 { transform: translate(-3px, 2px); } .stars-6 .s5 { transform: translate(3px, 2px); } .stars-6 .s6 { transform: translate(0, 4px); }
        .stars-7 .s1 { transform: translate(0, -4px); } .stars-7 .s2 { transform: translate(-3px, -2px); } .stars-7 .s3 { transform: translate(3px, -2px); } .stars-7 .s4 { transform: translate(0, 0); font-size: 4px; } .stars-7 .s5 { transform: translate(-3px, 2px); } .stars-7 .s6 { transform: translate(3px, 2px); } .stars-7 .s7 { transform: translate(0, 4px); }

        .import-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        textarea { width: 100%; height: 120px; background-color: #0f172a; color: #fff; border: 1px solid #475569; border-radius: 10px; padding: 10px; font-size: 0.85rem; font-family: inherit; resize: none; }
        textarea::placeholder { color: #64748b; }
    </style>
</head>
<body>

    <div class="header">
        <h1>新昌兰足球队</h1>
        <div class="subtitle">🔮 第五赛季 · 龙珠同步云端版 🔮</div>
    </div>

    <div class="db-status-bar">
        <div class="status-left">
            <span id="status-dot" class="status-dot"></span>
            <span>云端状态：<span id="cloud-msg">正在连接极速大榜...</span></span>
        </div>
    </div>

    <div class="rule-card">
        <div class="rule-title">🔮 赛季玩法说明</div>
        <div class="rule-item">一、每位球员赛季起始【战斗力数值】固定为 <em>1000 万</em></div>
        <div class="rule-item">二、当日次日接龙<strong>加 500 万</strong>，其余时段接龙<strong>加 200 万</strong></div>
        <div class="rule-item">三、每踢一场球获得 <strong>1 颗龙珠</strong>，集满 7 颗可召唤并让该球员战力 <strong>+700 万</strong></div>
    </div>

    <div class="footer-nav">
        <div id="btn-rank" class="nav-item active" onclick="switchTab('tab-rank')">📊 实时战斗力榜</div>
        <div id="btn-attendance" class="nav-item" onclick="switchTab('tab-attendance')">🐉 考勤自动接入</div>
    </div>

    <div class="fixed-bottom-bar">
        <button class="btn-bottom btn-bottom-refresh" onclick="loadFromCloud(true)">🔄 手动刷新云端数据</button>
        <button class="btn-bottom btn-bottom-cloud" onclick="saveToCloud()">💾 保存并同步到全队手机</button>
    </div>

    <div id="tab-rank" class="tab-content active">
        <div class="card">
            <div class="card-header">全队共享排行榜（点击当前战斗力可手动排序）</div>
            <div class="btn-group">
                <button class="btn" onclick="addRow()">＋ 增加新成员</button>
                <button id="btn-undo-rank" class="btn btn-undo" style="display:none;" onclick="undoRankAction()">↩️ 撤销上一步操作</button>
            </div>
            <div class="table-responsive">
                <table id="rank-table">
                    <thead>
                        <tr>
                            <th style="width: 10%;">序</th>
                            <th style="width: 30%;">球员名称</th>
                            <th style="width: 22%;" class="sortable-th" onclick="sortPlayersByPower()">当前战斗力 ↕</th>
                            <th style="width: 38%;">龙珠收集状态</th>
                        </tr>
                    </thead>
                    <tbody id="rank-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-attendance" class="tab-content">
        <div class="card">
            <div class="card-header">⚡ 周二/周六群接龙文本解析</div>
            <div class="import-area">
                <textarea id="import-text" placeholder="在这里粘贴群里的接龙文本，一键同步..."></textarea>
                <div class="btn-group">
                    <button class="btn btn-blue" onclick="parseAttendanceText()">🔍 解析并导入名单</button>
                    <button class="btn btn-green" onclick="syncToRank()">🔄 确认出勤并一键同步到榜单</button>
                </div>
                <div class="btn-group" id="undo-sync-container" style="display:none; margin-top: -4px;">
                    <button class="btn btn-undo" onclick="undoSyncAttendance()">↩️ 撤销本次考勤同步（退回数据）</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">本次活动出勤核对表</div>
            <div class="batch-control">
                <span class="batch-title">⚡ 快速批量操作（解放双手）：</span>
                <button class="btn btn-sm" style="background:#475569;" onclick="batchSetProperty('当日次日')">全选: 当日次日(+500万)</button>
                <button class="btn btn-sm" style="background:#475569;" onclick="batchSetProperty('其余接龙')">全选: 其余接龙(+200万)</button>
                <button class="btn btn-sm" style="background:#1e3a8a;" onclick="batchSetStatus('出战')">全选: 已出战</button>
            </div>
            <div class="table-responsive">
                <table id="attendance-table">
                    <thead>
                        <tr>
                            <th style="width: 30%;">球员名称</th>
                            <th style="width: 35%;">接龙属性</th>
                            <th style="width: 35%;">最终出勤状态</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🚀 更换为极速无拦截通用多云冗余库
        const TEAM_KEY = "xinchanglan_fc_season5_v2"; 
        const CLOUD_URL = `https://api.v0.lol/kv/${TEAM_KEY}`; 

        const defaultPlayers = [
            {name: "乐乐", power: 1000, balls: 1}, {name: "strongmao🐭🐹🐷🐴", power: 1000, balls: 1},
            {name: "唐朝", power: 1000, balls: 1}, {name: "Bobo", power: 1000, balls: 1},
            {name: "刘刚", power: 1000, balls: 1}, {name: "老家具", power: 1000, balls: 1},
            {name: "Kiwi", power: 1000, balls: 1}, {name: "大理寺少卿", power: 1000, balls: 1},
            {name: "🇳🇱", power: 1000, balls: 1}, {name: "Spike", power: 1000, balls: 1},
            {name: "简单～低调", power: 1000, balls: 1}, {name: "Lee", power: 1000, balls: 1},
            {name: "迪迪", power: 1000, balls: 1}, {name: "yc", power: 1000, balls: 1},
            {name: "AAA专业下水道添堵", power: 1000, balls: 1}, {name: "Y", power: 1000, balls: 1},
            {name: "小曹", power: 1000, balls: 1}, {name: "楊光", power: 1000, balls: 1},
            {name: "老张白相", power: 1000, balls: 1}, {name: "chenyi", power: 1000, balls: 1},
            {name: "哈里凯恩", power: 1000, balls: 1}, {name: "高丰", power: 1000, balls: 1},
            {name: "刘人畅", power: 1000, balls: 1}, {name: "Z.🍜", power: 1000, balls: 1}
        ];

        let globalPlayers = [];
        let rankHistoryBackup = null;
        let syncHistoryBackup = null;

        function updateStatusUI(text, status='loading') {
            const el = document.getElementById('cloud-msg');
            const dot = document.getElementById('status-dot');
            if(el) el.innerText = text;
            if(dot) {
                dot.className = 'status-dot';
                if(status === 'success') { dot.classList.add('online'); if(el) el.style.color = '#10b981'; }
                else if(status === 'error') { dot.classList.add('offline'); if(el) el.style.color = '#f43f5e'; }
                else { if(el) el.style.color = '#eab308'; }
            }
        }

        // 🌐 秒级云端数据加载
        function loadFromCloud(isManual = false) {
            updateStatusUI("正在秒级加载云端大榜...");
            fetch(CLOUD_URL)
            .then(res => res.text())
            .then(text => {
                if(text && text.trim().length > 10) {
                    globalPlayers = JSON.parse(text);
                    sortPlayersByPower();
                    updateStatusUI("已完美实时同步云端数据", 'success');
                    if(isManual) alert("🔄 极速刷新成功！已获取最新的云端大榜数据。");
                } else {
                    useFallbackLocal();
                }
            })
            .catch(() => {
                useFallbackLocal();
            });
        }

        function useFallbackLocal() {
            const savedData = localStorage.getItem('xcl_v19_local_backup');
            if (savedData) {
                globalPlayers = JSON.parse(savedData);
                sortPlayersByPower();
                updateStatusUI("网络微弱，当前展示手机本地缓存", 'error');
            } else {
                globalPlayers = [...defaultPlayers];
                sortPlayersByPower();
                updateStatusUI("未连接到云，已初始化初始名单", 'error');
            }
        }

        // 🌐 秒级云端打包锁死
        function saveToCloud() {
            updateStatusUI("正在秒级同步全队云端...");
            const jsonStr = JSON.stringify(globalPlayers);
            localStorage.setItem('xcl_v19_local_backup', jsonStr);

            fetch(CLOUD_URL, {
                method: 'POST',
                body: jsonStr
            })
            .then(res => {
                if(res.ok) {
                    updateStatusUI("✨ 已成功锁死并同步全队手机！", 'success');
                    alert("💾 秒级同步成功！最新数据已完美发布。现在全队任何人刷新你的网页，看到的都是你刚刚调整完毕的最新大榜！");
                } else {
                    throw new Error();
                }
            })
            .catch(() => {
                updateStatusUI("⚠️ 云端网络拥堵，已帮您妥善保存在当前手机本地", 'error');
                alert("💾 提示：已先保存在本手机浏览器中，请检查网络后再试！");
            });
        }

        function saveToRankHistory() {
            rankHistoryBackup = JSON.stringify(globalPlayers);
            document.getElementById('btn-undo-rank').style.display = 'inline-block';
        }

        function undoRankAction() {
            if (rankHistoryBackup) {
                globalPlayers = JSON.parse(rankHistoryBackup);
                rankHistoryBackup = null;
                document.getElementById('btn-undo-rank').style.display = 'none';
                sortPlayersByPower();
                alert("↩️ 已成功撤销上一步的榜单变更！");
            }
        }

        function undoSyncAttendance() {
            if (syncHistoryBackup) {
                globalPlayers = JSON.parse(syncHistoryBackup);
                syncHistoryBackup = null;
                document.getElementById('undo-sync-container').style.display = 'none';
                sortPlayersByPower();
                alert("↩️ 考勤数据同步已完美撤销！大名单已退回到同步前的状态。");
                switchTab('tab-rank');
            }
        }

        function renderInfiniteBalls(totalCount) {
            let html = '';
            for (let i = 1; i <= totalCount; i++) {
                let starCount = ((i - 1) % 7) + 1;
                html += `<div class="mini-ball"><div class="star-container stars-${starCount}">`;
                for (let j = 1; j <= starCount; j++) { html += `<span class="mini-star s${j}">★</span>`; }
                html += `</div></div>`;
            }
            return html;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'tab-rank') document.getElementById('btn-rank').classList.add('active');
            if(tabId === 'tab-attendance') document.getElementById('btn-attendance').classList.add('active');
        }

        function renderRankTable() {
            const tbody = document.getElementById('rank-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            globalPlayers.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td class="editable"><span class="player-name-text" contenteditable="true" onblur="updatePlayerName(${idx}, this)">${p.name}</span></td>
                    <td class="editable power-text" contenteditable="true" onfocus="saveToRankHistory()" onblur="updatePlayerPower(${idx}, this)">${p.power}万</td>
                    <td>
                        <div class="balls-container">
                            <div class="balls-row" onclick="addBall(${idx})">${renderInfiniteBalls(p.balls)}</div>
                            <div class="action-btns">
                                <button class="btn-mini btn-consume" onclick="consumeBalls(${idx}, event)">召唤</button>
                                <button class="btn-mini btn-minus" onclick="minusBall(${idx}, event)">➖</button>
                            </div>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function sortPlayersByPower() {
            globalPlayers.sort((a, b) => (b.power || 0) - (a.power || 0));
            renderRankTable();
        }

        function addBall(idx) {
            saveToRankHistory();
            globalPlayers[idx].balls = (globalPlayers[idx].balls || 0) + 1;
            renderRankTable();
        }

        function minusBall(idx, event) {
            event.stopPropagation();
            if (globalPlayers[idx].balls > 0) {
                saveToRankHistory();
                globalPlayers[idx].balls -= 1;
                renderRankTable();
            }
        }

        function consumeBalls(idx, event) {
            event.stopPropagation();
            if (globalPlayers[idx].balls < 7) {
                alert(`🔮 ${globalPlayers[idx].name} 龙珠不足 7 颗！`);
                return;
            }
            saveToRankHistory();
            globalPlayers[idx].balls -= 7;
            globalPlayers[idx].power = (globalPlayers[idx].power || 1000) + 700;
            alert(`🐉 成功消耗 ${globalPlayers[idx].name} 的 7 颗龙珠！其战斗力已 +700万`);
            sortPlayersByPower();
        }

        function updatePlayerName(idx, el) {
            saveToRankHistory();
            globalPlayers[idx].name = el.innerText.trim();
        }

        function updatePlayerPower(idx, el) {
            const val = parseInt(el.innerText.replace(/[^0-9]/g, '')) || 1000;
            if(globalPlayers[idx].power !== val) {
                globalPlayers[idx].power = val;
                el.innerText = val + '万';
                sortPlayersByPower();
            }
        }

        function addRow() {
            saveToRankHistory();
            globalPlayers.push({name: "新球员", power: 1000, balls: 1});
            renderRankTable();
        }

        function batchSetProperty(value) {
            document.querySelectorAll('.type-select').forEach(select => select.value = value);
        }

        function batchSetStatus(value) {
            document.querySelectorAll('.status-select').forEach(select => select.value = value);
        }

        function parseAttendanceText() {
            const text = document.getElementById('import-text').value;
            if (!text.trim()) { alert("请在输入框中粘贴接龙文字！"); return; }
            const tbody = document.getElementById('attendance-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            const lines = text.split('\n');
            let matchedCount = 0;

            lines.forEach(line => {
                let cleanLine = line.trim();
                if (!cleanLine) return;
                cleanLine = cleanLine.replace(/^\d+[\.\、\s\-\s]+/g, '').trim();
                if (!cleanLine) return;
                let 接龙时段 = "其余接龙";
                if (cleanLine.includes("周二") || cleanLine.includes("周三")) 接龙时段 = "当日次日";
                let name = cleanLine.replace(/[\(\（].*?[\)\意变\）]/g, '').trim();
                if (name) {
                    matchedCount++;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b class="player-name-text">${name}</b></td>
                        <td>
                            <select class="type-select">
                                <option value="当日次日" ${接龙时段 === '当日次日' ? 'selected' : ''}>📅 当日次日接龙 (+500万)</option>
                                <option value="其余接龙" ${接龙时段 === '其余接龙' ? 'selected' : ''}>⏳ 其余时间接龙 (+200万)</option>
                            </select>
                        </td>
                        <td>
                            <select class="status-select">
                                <option value="出战">🔥 已到场出战</option>
                                <option value="请假">❌ 临时请假</option>
                                <option value="未到">⏳ 未到场</option>
                            </select>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
            if (matchedCount === 0) alert("未在文本中提取到名单！");
            else alert(`🎉 成功解析 ${matchedCount} 位球员！`);
        }

        function syncToRank() {
            const rows = document.querySelectorAll('#attendance-tbody tr');
            if (rows.length === 0) { alert("当前核对表没有数据！"); return; }
            syncHistoryBackup = JSON.stringify(globalPlayers);
            document.getElementById('undo-sync-container').style.display = 'flex';
            let syncCount = 0;

            rows.forEach(row => {
                const name = row.querySelector('.player-name-text').innerText.trim();
                const type = row.querySelector('.type-select').value;
                const status = row.querySelector('.status-select').value;

                if (status === '出战') {
                    let player = globalPlayers.find(p => p.name === name);
                    if (!player) {
                        player = { name: name, power: 1000, balls: 0 };
                        globalPlayers.push(player);
                    }
                    player.power = (player.power || 1000) + (type === '当日次日' ? 500 : 200);
                    player.balls = (player.balls || 0) + 1;
                    syncCount++;
                }
            });

            sortPlayersByPower();
            alert(`⚙️ 考勤同步完毕！已接入 ${syncCount} 位到场队员。提示：请记得点击最下方的「保存并同步到全队手机」同步到云端！`);
            switchTab('tab-rank');
        }

        window.onload = function() {
            loadFromCloud();
        }
    </script>
</body>
</html>
